<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="Css/hiddencomponent.css" />
  </head>
  <body>
    <span>
      <button onclick="setTimer5()" class="active">.</button>
      <button onclick="setTimer10()" class="active">.</button>
      <button onclick="setTimer25()" class="active">.</button>
    </span>
    <span>
      <div id="timer">25:00</div>
    </span>
    <span>
      <button onclick="addOne()" class="active">+ 1</button>
      <button onclick="addFive()" class="active">+ 5</button>
      <button onclick="addTwentyFive()" class="active">+ 25</button>
    </span>
    <span>
      <button onclick="start()" class = "active">Start</button>
      <button onclick="pause()" class="hidden1">Pause</button>
      <button onclick="skip()" class="hidden1">Skip</button>
    </span>
    <script>
      let minutes = 25;
      let seconds = 0;
      let intervalId = null;
      let time = minutes * 60;
      const timer = document.getElementById("timer");
      function updateDisplay() {
        let m = String(minutes).padStart(2, "0");
        let s = String(seconds).padStart(2, "0");
        timer.innerText = m + ":" + s;
      }
      function setTime(value) {
        minutes = value;
      }
      function setTimer5() {
        setTime(5);
        updateDisplay();
      }
      function setTimer10() {
        setTime(10);
        updateDisplay();
      }
      function setTimer25() {
        setTime(25);
        updateDisplay();
      }
      function addTime(value) {
        minutes += value;
      }
      function addOne() {
        addTime(1);
        updateDisplay();
      }
      function addFive() {
        addTime(5);
        updateDisplay();
      }
      function addTwentyFive() {
        addTime(25);
        updateDisplay();
      }
      function start() {
        if (intervalId !== null) return;
        
        time = minutes * 60;
        document.getElementById("active").classList.add("Css/active.css");
        document.getElementById("hiddencomponent").classList.remove("Css/hiddencomponent.css")
        intervalId = setInterval(function () {
          if (time <= 0) {
            clearInterval(intervalId);
            intervalId = null;
            console.allert("End Season")
            return;
          }
          time--;
          minutes = Math.floor(time / 60);
          seconds = time % 60;
          updateDisplay();
        }, 1000);
      }
      function pause() {
        clearInterval(intervalId);
        intervalId = null;
      }
      function skip() {
        clearInterval(intervalId);
        intervalId = null;
        minutes = 25;
        seconds = 0;
        updateDisplay();
      }
    </script>
  </body>
</html>
