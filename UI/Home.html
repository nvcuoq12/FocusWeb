<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <span>
        <button onclick ="setTimer5()" class = "">.</button>
        <button onclick = "setTimer10()" class = "">.</button>
        <button onclick = "setTimer25()" class = "">.</button>
    </span>
    <span>
        <div id = "timer">25:00</div>
    </span>
    <span>
        <button onclick ="addOne()" class = ""> + 1 </button>
        <button onclick = "addFive()" class = ""> + 5</button>
        <button onclick = "addTwentyFive()" class = ""> + 25</button>
    </span>
    <span>
        <button onclick = "start()"> Start </button>
        <button onclick = "pause()" style="display: none;"> Pause </button>
        <button onclick = "skip()" style="display: none;"> Skip </button>
    </span>
    <script>
        let minutes = 25;
        let seconds = 0;
        let intervalId = null;
        let time = minutes * 60;
        const timer = document.getElementById("timer");
        function updateDisplay(){
            let m = String(minutes).padStart(2, "0");
            let s = String(seconds).padStart(2, "0");
            timer.innerText  = m + ":" + s;
        }
        function setTime(value){
            minutes = value;
        }
        function setTimer5(){
            setTime(5);
            updateDisplay();
        }
        function setTimer10(){
            setTime(10);
            updateDisplay()
        }
        function setTimer25(){
            setTime(25);
            updateDisplay()
        }
        function addTime(value){
            minutes += value;
        }
        function addOne(){
            addTime(1); updateDisplay();
        }
        function addFive(){
            addTime(5); updateDisplay();
        }
        function addTwentyFive(){
            addTime(25); updateDisplay();
        }
        function start(){
            if (intervalId !== null) return;
            document.querySelector("button[onclick='start()']").style.display = "none";
            document.querySelector("button[onclick = 'pause()']").style.display = "inline-block";
            document.querySelector("button[onclick = 'skip()']").style.display = "inline-block";
            time = minutes * 60;
            intervalId = setInterval(function(){
                if (time <= 0){
                    clearInterval(intervalId);
                    intervalId = null;
                    return;
                }
                time --;
                minutes = Math.floor(time / 60);
                seconds = time % 60;
                updateDisplay();
            }, 1000)
        }
        function pause(){
            clearInterval(intervalId);
            intervalId = null;
        } 
        function skip(){
            clearInterval(intervalId);
            intervalId = null;
            minutes = 25;
            seconds = 0;
            updateDisplay();
        }
    </script>
</body>
</html>
