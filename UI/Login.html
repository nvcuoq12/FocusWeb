<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepFocus</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card shadow-lg p-4" style="width: 400px">
        <!-- Tabs -->
        <ul
          class="nav nav-pills nav-justified mb-4"
          id="authTabs"
          role="tablist"
        >
          <li class="nav-item">
            <button
              class="nav-link active"
              data-bs-toggle="tab"
              data-bs-target="#loginTab"
              type="button"
            >
              Đăng nhập
            </button>
          </li>
          <li class="nav-item">
            <button
              class="nav-link"
              data-bs-toggle="tab"
              data-bs-target="#registerTab"
              type="button"
            >
              Đăng ký
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- LOGIN -->
          <div class="tab-pane fade show active" id="loginTab">
            <h4 class="text-center mb-3">Welcome</h4>
            <p class="text-center text-muted">Sign in by email</p>

            <form action="/login" method="post">
              <div class="mb-3">
                <label class="form-label">Email của bạn</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input
                  type="password"
                  name="password"
                  class="form-control"
                  minlength="6"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Đăng nhập
              </button>
            </form>
          </div>

          <!-- REGISTER -->
          <div class="tab-pane fade" id="registerTab">
            <h4 class="text-center mb-3">Bắt đầu hành trình</h4>
            <p class="text-center text-muted">
              Tạo tài khoản mới để cá nhân hóa lộ trình học tập
            </p>

            <form id="registerForm" action="/register" method="post">
              <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input
                  type="text"
                  name="username"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Địa chỉ email</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input
                  type="password"
                  id="regPassword"
                  name="regPassword"
                  class="form-control"
                  minlength="6"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input
                  type="password"
                  id="confirmPassword"
                  class="form-control"
                  minlength="6"
                  required
                />
              </div>

              <p id="regError" class="text-danger small"></p>

              <button type="submit" class="btn btn-success w-100">
                Đăng ký
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="JS/checkMK.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
