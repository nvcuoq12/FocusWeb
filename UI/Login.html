<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .hidden {
      display: none;
    }
    </style>
  </head>
  <body>
    <div>
      <div>
        <button id = "showLogin">Đăng nhập</button>
        <button id = "showRegister">Đăng ký</button>
      </div>
      <div id="loginModal">
        <div>
          <h1>Welcome</h1>
          <p>Sign in by email</p>
        </div>
        <form id = "loginForm" action = "/login" method = "post">
            <div>
              <label for="email">Email của bạn </label> <br />
              <input type="email" id="email" name="email" required />
            </div>
            <div>
              <label for="password">Mật khẩu</label> <br />
              <input type="password" id="password" name="pasword" minlength="6" required />
            </div>
            <div> 
                <p id = "error"></p>
            </div>
            <div>
              <button type="submit" value="submit">Đăng nhập</button>
            </div>
          </div>
        </form>
      </div>
      <div id="registerModal" class="hidden">
        <div>
          <h1>Bắt đầu hành trình</h1>
          <p>Tạo tài khoản mới để cá nhân hóa lộ trình học tập của bạn</p>
        </div>
        <form id = "registerForm" action = "/register" method="post">
          <div>
            <div>
              <label for="username">Họ và tên</label><br />
              <input type="text" id="username" name="username" required />
            </div>
            <div>
              <label for="regEmail">Địa chỉ email</label> <br />
              <input type="email" id="regEmail" name="email" required />
            </div>
            <div>
              <label for="password">Mật khẩu</label> <br />
              <input type="password" id="regPassword" name="pasword" minlength="6" required />
            </div>
            <div>
              <label for="confirmPassword">Xác nhận mật khẩu</label><br>
              <input type="password" id="confirmPassword" minlength = "6" required />
            </div>
            <p id = "regError"></p>
            </div>
            <button type="submit"> Đăng ký</button>
        </form>
      </div>
    </div>
    <script src = "JS/loginAndRegister.js"></script>
    <script src = "JS/checkMK.js"> </script>
  </body>
</html>
