<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 80px;
      }

      #timer {
        font-size: 80px;
        margin: 30px 0;
      }

      /* ===== 3 chấm tròn ===== */
      .dots {
        margin-bottom: 20px;
      }

      .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ccc;
        display: inline-block;
        margin: 0 10px;
        cursor: pointer;
      }

      .dot.active {
        background: #000;
      }

      /* ===== nút cộng thời gian ===== */
      .add-buttons button {
        width: 50px;
        height: 35px;
        margin: 5px;
        cursor: pointer;
      }

      /* ===== control ===== */
      .controls button {
        padding: 10px 25px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    

    <script>
      let defaultTime = 25 * 60;
      let time = defaultTime;
      let interval = null;

      const timer = document.getElementById("timer");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const resumeBtn = document.getElementById("resumeBtn");
      const skipBtn = document.getElementById("skipBtn");

      const dotsContainer = document.querySelector(".dots");
      const addButtonsContainer = document.querySelector(".add-buttons");
      const dots = document.querySelectorAll(".dot");

      function updateDisplay() {
        const minutes = Math.floor(time / 60);
        const seconds = time % 60;

        timer.innerText =
          String(minutes).padStart(2, "0") +
          ":" +
          String(seconds).padStart(2, "0");
      }

      function startTimer() {
        interval = setInterval(() => {
          if (time <= 0) {
            clearInterval(interval);
            interval = null;
            resetTimer();
            return;
          }

          time--;
          updateDisplay();
        }, 1000);
      }

      function setTime(minutes, element) {
        clearInterval(interval);
        interval = null;

        defaultTime = minutes * 60;
        time = defaultTime;
        updateDisplay();

        dots.forEach((dot) => dot.classList.remove("active"));
        element.classList.add("active");

        resetButtons();
      }

      function addTime(minutes) {
        time += minutes * 60;
        updateDisplay();
      }

      function resetTimer() {
        time = defaultTime;
        updateDisplay();
        resetButtons();

        // HIỆN lại dots và + buttons
        dotsContainer.classList.remove("hidden");
        addButtonsContainer.classList.remove("hidden");
      }

      function resetButtons() {
        startBtn.classList.remove("hidden");
        pauseBtn.classList.add("hidden");
        resumeBtn.classList.add("hidden");
        skipBtn.classList.add("hidden");
      }

      startBtn.onclick = function () {
        startTimer();

        startBtn.classList.add("hidden");
        pauseBtn.classList.remove("hidden");
        skipBtn.classList.remove("hidden");

        // ẨN dots và + buttons
        dotsContainer.classList.add("hidden");
        addButtonsContainer.classList.add("hidden");
      };

      pauseBtn.onclick = function () {
        clearInterval(interval);
        interval = null;

        pauseBtn.classList.add("hidden");
        resumeBtn.classList.remove("hidden");
      };

      resumeBtn.onclick = function () {
        startTimer();

        resumeBtn.classList.add("hidden");
        pauseBtn.classList.remove("hidden");
      };

      skipBtn.onclick = function () {
        clearInterval(interval);
        interval = null;
        resetTimer();
      };

      updateDisplay();
    </script>
  </body>
</html>
