<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepFocus</title>
    <link rel="icon" type="image/x-icon" href="logo.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
      .hidden {
      display: none;
      }
      .color-box{
        width: 10px;
        height: 10px;
        display: inline-block;
        border-radius: 3px;
      }
      .tag-actions {
        opacity: 0;
        transition: 0.2s ease;
      }

      .dropdown-item:hover .tag-actions {
        opacity: 1;
      }

      .edit-icon {
        color: #ffc107;
        cursor: pointer;
      }

      .delete-icon {
        color: #dc3545;
        cursor: pointer;
      }
      body {
        font-family: monospace;
      }

      #timer {
        font-size: 80px;
        margin: 30px 0;
      }

      .dots {
        display: flex;
        margin-bottom: 20px;
        justify-content: center;
        gap: 15px;
      }

      .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ccc;
        display: inline-block;
        margin: 0 10px;
        cursor: pointer;
      }

      .dot.active {
        background: #000;
      }

      
      .add-buttons button {
        justify-content: center;
        width: 50px;
        height: 35px;
        margin: 5px;
        cursor: pointer;
      }

      .controls button {
        justify-content: center;
        padding: 10px 25px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
      }
      .controls {
        display: flex;
        justify-content: center;
      }
      .hidden {
        display: none;
      }
      .body{
          min-height: 100vh;
          background: linear-gradient(135deg, #c7d0e2, #2a5298);

      }
      .color-picker input {
        display: none;
      }

.color-box1 {
  width: 20px;
  height: 20px;
  border-radius: 10px;
  cursor: pointer;
  display: inline-block;
  transition: all 0.2s ease;
  border: 2px solid transparent;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}


.color-box1:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

input:checked + .color-box1 {
  border: 3px solid black;
  transform: scale(1.1);
  box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}
.custom-task-list {
  gap: 12px;
}

.task-item {
  background: white;
  padding: 12px 16px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: 0.2s;
  border: 1px solid #eee;
}

.task-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}

.task-check {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.task-check:checked + .task-text {
  text-decoration: line-through;
  color: gray;
}

.task-actions i {
  cursor: pointer;
  transition: 0.2s;
}

.edit-icon:hover {
  color: #0d6efd;
}

.delete-icon:hover {
  color: #dc3545;
}

    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <!-- homepage-->
    <div id = "homePage" class = "body">
      <div id = "Navbar">
        <nav class="navbar" style="background-color: #7e93a3;" data-bs-theme="light">
          <div class = "container-fluid">
              <a class="navbar-brand" href="#">
              <img src="logo.svg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                DeepFocus
              </a>
          </div>
        </nav>
      </div>
      <div id = "Body" class = "container d-flex flex-column align-items-center justify-content-center mt-2">
        <div>
          <button id = "TagButton" class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" >
            Select a Tag
          </button>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li>
                <div class = "dropdown-item tag-item d-flex justify-content-between align-items-center">
                  <div class="tag-content d-flex align-items-center"  type = "button">
                    <span class = "color-box me-2" style="background: green;" ></span>Study
                  </div>
                  <div class ="tag-actions">
                    <i class="bi bi-pencil-square me-2 edit-icon" data-bs-toggle="modal" data-bs-target="#editTagModal" data-mode = "edit"></i>
                    <i class="bi bi-trash delete-icon"></i>
                  </div>
                </div>
              </li>
              <li>
                <div class="dropdown-item tag-item d-flex justify-content-between align-items-center">
                  <div class="tag-content d-flex align-items-center">
                    <span class="color-box me-2" style="background: aquamarine;"></span>
                    Break
                  </div>
                  <div class="tag-actions">
                    <i class="bi bi-pencil-square me-2 edit-icon" data-bs-toggle="modal" data-bs-target="#editTagModal" data-mode="edit"></i>
                    <i class="bi bi-trash delete-icon"></i>
                  </div>
                </div>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item"  type = "button"  data-bs-toggle="modal" data-bs-target="#editTagModal" data-mode = "add">
                  + Add new Tag
                </button>
              </li>
            </ul>
        </div>
        <div class = "Timer">
              <!-- 3 chấm tròn -->
            <div class="dots mt-3 ">
              <span class="dot active" onclick="setTime(25, this)"></span>
              <span class="dot" onclick="setTime(10, this)"></span>
              <span class="dot" onclick="setTime(5, this)"></span>
            </div>
              
            <div id="timer">25:00</div>

              <!-- +1 +5 +10 -->
            <div class="add-buttons">
              <button onclick="addTime(1)">+1</button>
              <button onclick="addTime(5)">+5</button>
              <button onclick="addTime(10)">+10</button>
            </div>

            <!-- Start / Pause / Resume / Skip -->
            <div class="controls">
              <button id="startBtn">Start</button>
              <button id="pauseBtn" class="hidden">Pause</button>
              <button id="resumeBtn" class="hidden">Resume</button>
              <button id="skipBtn" class="hidden">Skip</button>
            </div>
          </div>
      </div>

      <!--Task-->
      <div class="d-flex justify-content-center mt-2">
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#taskModal">
          <i class="bi bi-list-task me-2 d-inline-block"></i>
          Select Task
        </button>
      </div>
    </div>

    
    <!-- Edit Tag Modal -->
    <div class="modal fade" id="editTagModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          
          <div class="modal-header">
            <h5 class="modal-title">Modal Title</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          
          <div class="modal-body">
            <div class="color-picker d-flex gap-3 d-inline-block">

              <label>
                <input type="radio" name="color" value="red">
                <span class="color-box1 bg-danger"></span>
              </label>

              <label>
                <input type="radio" name="color" value="blue">
                <span class="color-box1 bg-primary"></span>
              </label>

              <label>
                <input type="radio" name="color" value="green">
                <span class="color-box1 bg-success"></span>
              </label>
              <label>
                <input type="radio" name="color" value="green">
                <span class="color-box1 bg-warning"></span>
              </label>

            </div>
            <input type="text" id="editTagInput" class="form-control">
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="saveTagBtn">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">Choose Task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="list-group custom-task-list">

              <div class="task-item d-flex align-items-center justify-content-between">
                
                <div class="d-flex align-items-center gap-3">
                  <input type="checkbox" class="task-check">
                  <span class="task-text">Học lập trình</span>
                </div>

                <div class="task-actions">
                  <i class="bi bi-pencil-square edit-icon"></i>
                  <i class="bi bi-trash delete-icon ms-3"></i>
                </div>

              </div>

              <div class="task-item d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                  <input type="checkbox" class="task-check">
                  <span class="task-text">Học Tiếng Anh</span>
                </div>

                <div class="task-actions">
                  <i class="bi bi-pencil-square edit-icon"></i>
                  <i class="bi bi-trash delete-icon ms-3"></i>
                </div>
              </div>

            </div>
            <div class="collapse mt-3" id="newTaskForm">
              <div class="card card-body">
                <input type="text" class="form-control mb-2" placeholder="Enter new task">
                <button class="btn btn-success btn-sm">
                  Save Task
                </button>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-toggle="collapse" data-bs-target="#newTaskForm">
              Add New Task
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src = "JS/checkMK.js"> </script>
    <script src =  "JS/checkLogin.js"></script>
    <script src ="JS/Tag.js"></script>
    <script src = "JS/Timer.js"></script>
    <script src = "JS/Task.js"></script>
  </body>
</html>
