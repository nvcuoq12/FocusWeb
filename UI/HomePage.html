<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepFocus</title>
    <link rel="icon" type="image/x-icon" href="logo.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="Css/Style.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- homepage-->
    <div id="homePage" class="body">
      <div id="Navbar">
        <nav
          class="navbar"
          style="background-color: #7e93a3"
          data-bs-theme="light"
        >
          <div class="container-fluid">
            <a class="navbar-brand" href="#">
              <img
                src="logo.svg"
                alt="Logo"
                width="30"
                height="24"
                class="d-inline-block align-text-top"
              />
              DeepFocus
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
              <!-- Streak -->
              <div class="d-flex align-items-center text-white fw-bold">
                <i class="bi bi-fire me-1 text-warning"></i>
                <span id="streakCount">5</span> days
              </div>

              <!-- User Dropdown -->
              <div class="dropdown">
                <button
                  class="btn btn-light dropdown-toggle"
                  type="button"
                  data-bs-toggle="dropdown"
                >
                  Nguyễn Trường
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <a
                      class="dropdown-item text-danger"
                      href="#"
                      id="logoutBtn"
                    >
                      Logout
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </nav>
      </div>
      <div
        id="Body"
        class="container d-flex flex-column align-items-center justify-content-center mt-5"
      >
        <div>
          <button
            id="TagButton"
            class="btn btn-secondary dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            Select a Tag
          </button>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li>
              <div
                class="dropdown-item tag-item d-flex justify-content-between align-items-center"
              >
                <div
                  class="tag-content d-flex align-items-center"
                  type="button"
                >
                  <span class="color-box me-2" style="background: green"></span
                  >Study
                </div>
                <div class="tag-actions">
                  <i
                    class="bi bi-pencil-square me-2 edit-icon"
                    data-bs-toggle="modal"
                    data-bs-target="#editTagModal"
                    data-mode="edit"
                  ></i>
                  <i class="bi bi-trash delete-icon"></i>
                </div>
              </div>
            </li>
            <li>
              <div
                class="dropdown-item tag-item d-flex justify-content-between align-items-center"
              >
                <div class="tag-content d-flex align-items-center">
                  <span
                    class="color-box me-2"
                    style="background: aquamarine"
                  ></span>
                  Break
                </div>
                <div class="tag-actions">
                  <i
                    class="bi bi-pencil-square me-2 edit-icon"
                    data-bs-toggle="modal"
                    data-bs-target="#editTagModal"
                    data-mode="edit"
                  ></i>
                  <i class="bi bi-trash delete-icon"></i>
                </div>
              </div>
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <button
                class="dropdown-item"
                type="button"
                data-bs-toggle="modal"
                data-bs-target="#editTagModal"
                data-mode="add"
              >
                + Add new Tag
              </button>
            </li>
          </ul>
        </div>
        <div class="Timer">
          <!-- 3 chấm tròn -->
          <div class="dots mt-3">
            <span class="dot active" onclick="setTime(25, this)"></span>
            <span class="dot" onclick="setTime(10, this)"></span>
            <span class="dot" onclick="setTime(5, this)"></span>
          </div>

          <div id="timer">25:00</div>

          <!-- +1 +5 +10 -->
          <div class="add-buttons">
            <button onclick="addTime(1)">+1</button>
            <button onclick="addTime(5)">+5</button>
            <button onclick="addTime(10)">+10</button>
          </div>

          <!-- Start / Pause / Resume / Skip -->
          <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn" class="hidden">Pause</button>
            <button id="resumeBtn" class="hidden">Resume</button>
            <button id="skipBtn" class="hidden">Skip</button>
          </div>
        </div>
      </div>

      <!--Task-->
      <div class="d-flex justify-content-center mt-2">
        <button
          class="btn btn-secondary"
          data-bs-toggle="modal"
          data-bs-target="#taskModal"
        >
          <i class="bi bi-list-task me-2 d-inline-block"></i>
          Select Task
        </button>
      </div>
    </div>

    <!-- Edit Tag Modal -->
    <div class="modal fade" id="editTagModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Modal Title</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div class="color-picker d-flex gap-3 d-inline-block">
              <label>
                <input type="radio" name="color" value="red" />
                <span class="color-box1 bg-danger"></span>
              </label>

              <label>
                <input type="radio" name="color" value="blue" />
                <span class="color-box1 bg-primary"></span>
              </label>

              <label>
                <input type="radio" name="color" value="green" />
                <span class="color-box1 bg-success"></span>
              </label>
              <label>
                <input type="radio" name="color" value="green" />
                <span class="color-box1 bg-warning"></span>
              </label>
            </div>
            <input type="text" id="editTagInput" class="form-control" />
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="saveTagBtn">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Choose Task</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div class="list-group custom-task-list">
              <div
                class="task-item d-flex align-items-center justify-content-between"
              >
                <div class="d-flex align-items-center gap-3">
                  <input type="checkbox" class="task-check" />
                  <span class="task-text">Học lập trình</span>
                </div>

                <div class="task-actions">
                  <i class="bi bi-pencil-square edit-icon"></i>
                  <i class="bi bi-trash delete-icon ms-3"></i>
                </div>
              </div>

              <div
                class="task-item d-flex align-items-center justify-content-between"
              >
                <div class="d-flex align-items-center gap-3">
                  <input type="checkbox" class="task-check" />
                  <span class="task-text">Học Tiếng Anh</span>
                </div>

                <div class="task-actions">
                  <i class="bi bi-pencil-square edit-icon"></i>
                  <i class="bi bi-trash delete-icon ms-3"></i>
                </div>
              </div>
            </div>
            <div class="collapse mt-4" id="newTaskForm">
              <div class="card card-body">
                <div class="row g-2">
                  <!-- Title -->
                  <div class="col-md-8">
                    <label for="taskTitle" class="form-label">Task Title</label>
                    <input
                      type="text"
                      id="taskTitle"
                      class="form-control"
                      placeholder="Enter task title"
                    />
                  </div>

                  <!-- Select Tag -->
                  <div class="col-md-4">
                    <label for="taskTag" class="form-label">Tag</label>
                    <select id="taskTag" class="form-select">
                      <option value="">Select tag</option>
                      <option value="study">Study</option>
                      <option value="work">Work</option>
                      <option value="personal">Personal</option>
                    </select>
                  </div>
                </div>

                <!-- Nút lưu -->
                <div class="mt-3 text-end">
                  <button class="btn btn-primary">Save Task</button>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-toggle="collapse"
              data-bs-target="#newTaskForm"
            >
              Add New Task
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Task</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div class="row g-2">
              <!-- Title -->
              <div class="col-md-8">
                <label class="form-label">Task Title</label>
                <input type="text" id="editTaskTitle" class="form-control" />
              </div>

              <!-- Tag -->
              <div class="col-md-4">
                <label class="form-label">Tag</label>
                <select id="editTaskTag" class="form-select">
                  <option value="study">Study</option>
                  <option value="work">Work</option>
                  <option value="personal">Personal</option>
                </select>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary" id="saveEditBtn">
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="JS/checkMK.js"></script>
    <script src="JS/checkLogin.js"></script>
    <script src="JS/Tag.js"></script>
    <script src="JS/Timer.js"></script>
    <script src="JS/Task.js"></script>
  </body>
</html>
